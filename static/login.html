<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers Login</title>

  <link rel="stylesheet" href="./css/main.css" />
</head>
<body>
  <header class="banner banner--login">
    <a href="../index.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
  </header>

  <main class="content">
    <form id="login-form" class="authorization">
      <label>
        Username
        <input type="text" id="username" required />
      </label>

      <label>
        Password
        <input type="password" id="password" required />
      </label>

      <button type="submit" class="primary">Login</button>
      <button type="button" id="back-button-login" class="secondary">
        Create Account
      </button>
      <p id="login-error" class="form-error" aria-live="polite"></p>
    </form>

  </main>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
