<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers Trip</title>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="banner banner--trip">
    <a href="dashboard.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
    <button type="button" id="logout-btn" class="banner-logout-btn">Logout</button>
    <h1>Trip</h1>
    <p class="banner-subtitle">Planning Dashboard</p>
  </header>

  <main class="content trip-dashboard">
    <div class="trip-dashboard-layout">
      <nav class="trip-dashboard-nav">
        <button type="button" id="back-to-trips" class="secondary">← Back to Trips</button>
        <div class="trip-dashboard-view-toggle" role="tablist" aria-label="Trip dashboard views">
          <button type="button" class="trip-view-toggle-btn" data-view="trip" aria-pressed="true">Trip View</button>
          <button type="button" class="trip-view-toggle-btn" data-view="pack" aria-pressed="false">Pack View</button>
        </div>
      </nav>

      <section class="trip-dashboard-summary">
        <div id="trip-dashboard-content">
          <p id="trip-dashboard-loading">Loading…</p>
        </div>
      </section>

      <section id="trip-dashboard-notes-panel" class="trip-dashboard-section trip-dashboard-notes-panel" style="display: none;">
        <h2>Notes</h2>
        <textarea id="trip-notes-textarea" placeholder="e.g. Can you buy meals? I don't have a filter." rows="4"></textarea>
        <button type="button" id="trip-notes-save" class="secondary">Save Notes</button>
      </section>

      <div class="trip-dashboard-block trip-dashboard-gear">
        <section id="trip-dashboard-gear-pool" class="trip-dashboard-section" style="display: none;">
          <h2>Equipment Pool</h2>
          <p>Select equipment from trip members to assign to this trip:</p>
          <div id="trip-gear-pool-list"></div>
        </section>
        <section id="trip-dashboard-assigned-gear" class="trip-dashboard-section" style="display: none;">
          <h2>Assigned Equipment</h2>
          <p>Equipment committed for this trip:</p>
          <div id="trip-assigned-gear-list"></div>
        </section>
        <section id="trip-dashboard-checklist" class="trip-dashboard-section" style="display: none;">
          <h2>What to Bring</h2>
          <ul id="trip-checklist-list"></ul>
        </section>
      </div>

      <section id="trip-dashboard-invited" class="trip-dashboard-section" style="display: none;">
        <h2>You're invited</h2>
        <p id="trip-invited-message"></p>
        <button type="button" id="trip-invite-accept">Accept</button>
        <button type="button" id="trip-invite-decline">Decline</button>
      </section>

      <div class="trip-dashboard-block trip-dashboard-team">
        <section id="trip-dashboard-members" class="trip-dashboard-section" style="display: none;">
          <h2>Trip Members</h2>
          <div id="trip-collaborators-list"></div>
        </section>
        <section id="trip-dashboard-pending-invites" class="trip-dashboard-section" style="display: none;">
          <h2>Pending Invites</h2>
          <div id="trip-pending-invites-list"></div>
        </section>
        <section id="trip-dashboard-invite-friend" class="trip-dashboard-section" style="display: none;">
          <h2>Invite a Friend</h2>
          <select id="trip-invite-friend-select">
            <option value="">Choose a friend…</option>
          </select>
          <button type="button" id="trip-invite-friend-btn">Send Invite</button>
          <p id="trip-invite-error" class="error"></p>
        </section>
      </div>
    </div>
  </main>

  <div id="edit-trip-modal" class="edit-trip-modal" role="dialog" aria-labelledby="edit-trip-modal-title" aria-modal="true" style="display: none;">
    <div class="edit-trip-modal-backdrop"></div>
    <div class="edit-trip-modal-content">
      <h2 id="edit-trip-modal-title">Edit Trip</h2>
      <form id="edit-trip-form">
        <input type="hidden" id="edit-trip-id" />
        <label for="edit-trip-name">Trip Name</label>
        <input type="text" id="edit-trip-name" placeholder="Trip Name" required />
        <label for="edit-trip-location-search">Location (search and select from catalog)</label>
        <div class="location-combobox edit-trip-combobox" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-owns="edit-trip-location-listbox">
          <input type="text" id="edit-trip-location-search" placeholder="e.g. Wonderland Trail" autocomplete="off" aria-autocomplete="list" aria-controls="edit-trip-location-listbox" />
          <input type="hidden" id="edit-trip-report-info-id" />
          <ul id="edit-trip-location-listbox" class="location-listbox" role="listbox" aria-label="Trail locations"></ul>
        </div>
        <label for="edit-trip-activity">Activity</label>
        <select id="edit-trip-activity" required>
          <option value="">Select Activity…</option>
          <option value="Backpacking">Backpacking</option>
          <option value="Hiking">Hiking</option>
          <option value="Car Camping">Car Camping</option>
          <option value="Bird Watching">Bird Watching</option>
          <option value="Backcountry Skiing">Backcountry Skiing</option>
          <option value="Mountaineering">Mountaineering</option>
        </select>
        <label for="edit-trip-date">Start date</label>
        <input type="date" id="edit-trip-date" />
        <label for="edit-trip-notes">Notes</label>
        <textarea id="edit-trip-notes" placeholder="e.g. Can you buy meals? I don't have a filter." rows="3"></textarea>
        <div class="edit-trip-modal-actions">
          <button type="button" id="edit-trip-cancel" class="secondary">Cancel</button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
      <p id="edit-trip-error" class="error"></p>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
