<!DOCTYPE html>
<!-- TrailFeathers - Trip planner page. Group: TrailFeathers. Authors (alphabetically by last name): Kim, Smith, Domst, and Snider. Last updated: 3/13/26 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers Trip Planner</title>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="banner banner--trip">
    <a href="dashboard.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
    <button type="button" id="logout-btn" class="banner-logout-btn">Logout</button>
    <h1 id="banner-title">Trip Planner</h1>
  </header>

  <main class="content trip-planner">
    <section class="trip-invites-section" id="trip-invites-section" style="display: none;">
      <h2>Trip Invites</h2>
      <div id="trip-invites-list"></div>
    </section>

    <div class="trip-planner-layout">
      <nav class="trip-planner-nav">
        <a href="dashboard.html" class="secondary nav-back">← Back to Home</a>
      </nav>

      <section class="trip-overview">
        <div class="trip-overview-toolbar">
          <h2>Active Trips</h2>
          <button type="button" id="edit-trips-btn" class="secondary">Edit Trips</button>
        </div>
        <div id="trip-list"></div>
      </section>

      <section class="trip-setup">
        <h2>Create a Trip</h2>
        <form id="create-trip-form">
          <input type="text" id="trip-name" placeholder="Trip Name" required />
          <label for="trip-location-search">Location (search and select from catalog)</label>
          <div class="location-combobox" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-owns="trip-location-listbox">
            <input type="text" id="trip-location-search" placeholder="e.g. Wonderland Trail" autocomplete="off" aria-autocomplete="list" aria-controls="trip-location-listbox" />
            <input type="hidden" id="trip-report-info-id" name="trip_report_info_id" />
            <ul id="trip-location-listbox" class="location-listbox" role="listbox" aria-label="Trail locations"></ul>
          </div>
          <label for="trip-activity">Activity</label>
          <select id="trip-activity" required>
            <option value="">Select Activity…</option>
            <option value="Backpacking">Backpacking</option>
            <option value="Hiking">Hiking</option>
            <option value="Car Camping">Car Camping</option>
            <option value="Bird Watching">Bird Watching</option>
            <option value="Backcountry Skiing">Backcountry Skiing</option>
            <option value="Mountaineering">Mountaineering</option>
          </select>
          <input type="date" id="trip-date" placeholder="Start date" />
          <label for="trip-notes">Notes (optional)</label>
          <textarea id="trip-notes" placeholder="e.g. Can you buy meals? I don't have a filter." rows="3"></textarea>
          <button type="submit">Create Trip</button>
        </form>
        <p id="create-trip-error" class="error"></p>
      </section>
    </div>

    <div id="dash-options">
      <button id="home">Home</button>
      <button id="inventory">My Gear Library</button>
      <button id="add-friend">Add a Friend</button>
    </div>
  </main>

  <div id="edit-trip-modal" class="edit-trip-modal" role="dialog" aria-labelledby="edit-trip-modal-title" aria-modal="true" style="display: none;">
    <div class="edit-trip-modal-backdrop"></div>
    <div class="edit-trip-modal-content">
      <h2 id="edit-trip-modal-title">Edit Trip</h2>
      <form id="edit-trip-form">
        <input type="hidden" id="edit-trip-id" />
        <label for="edit-trip-name">Trip Name</label>
        <input type="text" id="edit-trip-name" placeholder="Trip Name" required />
        <label for="edit-trip-location-search">Location (search and select from catalog)</label>
        <div class="location-combobox edit-trip-combobox" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-owns="edit-trip-location-listbox">
          <input type="text" id="edit-trip-location-search" placeholder="e.g. Wonderland Trail" autocomplete="off" aria-autocomplete="list" aria-controls="edit-trip-location-listbox" />
          <input type="hidden" id="edit-trip-report-info-id" />
          <ul id="edit-trip-location-listbox" class="location-listbox" role="listbox" aria-label="Trail locations"></ul>
        </div>
        <label for="edit-trip-activity">Activity</label>
        <select id="edit-trip-activity" required>
          <option value="">Select Activity…</option>
          <option value="Backpacking">Backpacking</option>
          <option value="Hiking">Hiking</option>
          <option value="Car Camping">Car Camping</option>
          <option value="Bird Watching">Bird Watching</option>
          <option value="Backcountry Skiing">Backcountry Skiing</option>
          <option value="Mountaineering">Mountaineering</option>
        </select>
        <label for="edit-trip-date">Start date</label>
        <input type="date" id="edit-trip-date" />
        <label for="edit-trip-notes">Notes</label>
        <textarea id="edit-trip-notes" placeholder="e.g. Can you buy meals? I don't have a filter." rows="3"></textarea>
        <div class="edit-trip-modal-actions">
          <button type="button" id="edit-trip-cancel" class="secondary">Cancel</button>
          <button type="submit">Save Changes</button>
        </div>
      </form>
      <p id="edit-trip-error" class="error"></p>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
