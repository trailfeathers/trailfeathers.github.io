<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers Social Center</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="banner banner--friends">
    <a href="dashboard.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
    <button type="button" id="logout-btn" class="banner-logout-btn">Logout</button>
    <h1 id="banner-title">Social Center</h1>
    <p class="banner-subtitle">Connect with Friends</p>
  </header>

  <main class="content friends-dashboard">
    <div class="friends-dashboard-layout">
      <nav class="friends-dashboard-nav">
        <a href="dashboard.html" class="secondary nav-back">← Back to Home</a>
      </nav>

      <section class="friends-dashboard-section friends-dashboard-section--primary">
        <h2>Add a Friend</h2>
        <form id="add-friend-form" class="friends-form">
          <label for="friend-username">Username</label>
          <input type="text" id="friend-username" name="username" placeholder="Enter username" required />
          <button type="submit" class="primary">Send Request</button>
        </form>
        <p id="add-friend-error" class="error"></p>
        <p id="add-friend-success" class="success"></p>
      </section>

      <section class="friends-dashboard-section">
        <h2>Friend requests</h2>
        <div id="friend-requests-list"></div>
      </section>

      <section class="friends-dashboard-section">
        <h2>My Friends</h2>
        <div id="my-friends-list"></div>
      </section>

      <section class="friends-dashboard-section">
        <h2>My Favorite Hikes</h2>
        <p class="friends-section-desc">Save hikes from the catalog to your profile.</p>
        <div class="favorites-add">
          <label for="add-favorite-select">Add from catalog</label>
          <select id="add-favorite-select">
            <option value="">Choose a hike…</option>
          </select>
          <button type="button" id="add-favorite-btn" class="primary">Add</button>
          <p id="add-favorite-error" class="error"></p>
        </div>
        <div id="my-favorites-list"></div>
      </section>
    </div>

    <div id="dash-options">
      <button type="button" id="home">Home</button>
      <button type="button" id="inventory">My Gear Library</button>
      <button type="button" id="plan-trip">Plan a Trip</button>
    </div>
  </main>

  <script  src="script.js"></script>
</body>
</html>
