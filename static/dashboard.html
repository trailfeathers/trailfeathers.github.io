<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers</title>

  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <header class="banner banner--dashboard">
    <a href="dashboard.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
    <button type="button" id="logout-btn" class="banner-logout-btn">Logout</button>
    <h1 id="banner-title">Trail Feathers</h1>
  </header>

  <main class="content">
    <h2 id="welcome">Your outdoor planning hub</h2>
    <p id="welcome-message">Manage your gear library, plan trips with friends, and keep everything in one place.</p>

    <!-- Set a specific image per button: change the path inside url('...') in each style. Path is relative to the static folder (e.g. images_for_site/your-photo.jpg). -->
    <div id="dash-options">
      <button type="button" id="inventory" class="dash-btn" style="--dash-btn-bg: url('images_for_site/marion_lake.JPG')">
        <span class="dash-btn-label">My Gear Library</span>
      </button>
      <button type="button" id="plan-trip" class="dash-btn" style="--dash-btn-bg: url('images_for_site/cape_perpetua.jpg')">
        <span class="dash-btn-label">Plan a Trip</span>
      </button>
      <button type="button" id="add-friend" class="dash-btn" style="--dash-btn-bg: url('images_for_site/rainier_valley.jpeg')">
        <span class="dash-btn-label">Social Center</span>
      </button>
    </div>

  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
