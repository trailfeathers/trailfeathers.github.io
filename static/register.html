<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrailFeathers Register</title>

  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="banner banner--login">
    <a href="dashboard.html" class="banner-logo-link" aria-label="Trail Feathers home">Trail Feathers</a>
    <h1>Trail Feathers</h1>
  </header>

  <main class="content">
    <form id="register-form" class="authorization">
      <label>
        Create Username
        <input type="text" id="username" required />
      </label>
    
      <label>
        Create Password
        <input type="password" id="password" required />
      </label>
    
      <label>
        Confirm Password
        <input type="password" id="confirm-password" required />
      </label>
    
      <button type="submit" class="primary">Create Account</button>
      <button type="button" id="back-button-register" class="secondary">
        Login
      </button>
      <p id="register-error" class="form-error" aria-live="polite"></p>
    </form>
  </main>

  <script src="./script.js"></script>
</body>
</html>
